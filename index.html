<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Devis – Pépinières Bourquin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bleu:#1B2A4A;--orange:#E8850A;--bp:#EBF0F8;--bp2:#D6E0F0;--orp:#FFF3E0;--vert:#1a6b2a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Arial,sans-serif;background:#e8ecf2;min-height:100vh;padding-bottom:40px;}
header{background:var(--bleu);border-bottom:4px solid var(--orange);padding:13px 18px;display:flex;align-items:center;gap:12px;}
header img{height:42px;}
header h1{color:#fff;font-size:1.1rem;font-weight:700;}
header p{color:rgba(255,255,255,.6);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.wrap{max-width:820px;margin:18px auto;padding:0 12px;}
.card{background:#fff;border-radius:9px;border:1px solid #d8e0ee;padding:16px;margin-bottom:14px;box-shadow:0 2px 7px rgba(27,42,74,.06);}
.ct{font-size:.68rem;font-weight:700;color:var(--bleu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--bp);}
.tog{display:flex;background:var(--bp);border-radius:7px;padding:3px;gap:3px;margin-bottom:14px;}
.tog button{flex:1;padding:11px 6px;border:none;border-radius:5px;font-size:.88rem;font-weight:600;cursor:pointer;background:transparent;color:var(--bleu);transition:all .2s;touch-action:manipulation;}
.tog button.on{background:var(--bleu);color:#fff;box-shadow:0 2px 5px rgba(27,42,74,.3);}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.mb12{margin-bottom:12px;}
label{display:block;font-size:.68rem;font-weight:700;color:var(--bleu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
input,select{width:100%;padding:10px;border:1.5px solid #cdd5e5;border-radius:6px;font-size:.95rem;color:#333;outline:none;-webkit-appearance:none;background:#fff;}
input:focus,select:focus{border-color:var(--bleu);}
input[readonly]{background:#f0f5fb;color:var(--vert);font-weight:700;border-color:#b0ccb8;}
.num-row{display:flex;align-items:flex-end;gap:8px;}
.num-row input{flex:1;}
.num-row button{padding:10px 14px;background:var(--bp);border:1.5px solid var(--bleu);border-radius:6px;color:var(--bleu);font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation;}
.num-row button:active{background:#cfd9f0;}
.lw{border:1px solid #dde6f4;border-radius:8px;padding:12px;margin-bottom:10px;background:#f8fafd;}
.lw:nth-child(even){background:#fff;}
.lnum{font-size:.7rem;color:#aaa;font-weight:700;margin-bottom:8px;}
.lr1{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.lr2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.lr2-ht{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.lr3{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.fl{font-size:.65rem;font-weight:700;color:var(--bleu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.fl.vert{color:var(--vert);}
.ltot{font-size:.88rem;font-weight:700;color:var(--bleu);}
.ltva{font-size:.75rem;color:#888;}
.coeff-info{font-size:.72rem;color:var(--vert);font-weight:600;background:#eaf4ec;padding:3px 8px;border-radius:4px;}
.bd{background:none;border:1.5px solid #e0b0b0;border-radius:5px;padding:7px 13px;cursor:pointer;color:#c0392b;font-size:.82rem;font-weight:600;touch-action:manipulation;}
.bd:active{background:#ffeaea;}
.ba{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;background:var(--bp);border:1.5px dashed var(--bleu);border-radius:7px;color:var(--bleu);font-size:.92rem;font-weight:600;cursor:pointer;margin-top:8px;width:100%;touch-action:manipulation;-webkit-appearance:none;}
.ba:active{background:#cfd9f0;}
.tot{margin-top:14px;}
.tl{display:flex;justify-content:space-between;padding:7px 10px;font-size:.9rem;border-bottom:1px solid #dde6f0;}
.tl.ht{background:var(--bp);font-weight:700;border-radius:6px 6px 0 0;}
.tl.sub{color:#666;font-size:.82rem;}
.tl.fin{background:var(--orange);color:#fff;font-weight:700;font-size:.95rem;border-radius:0 0 6px 6px;border:none;padding:9px 10px;}
.bg{width:100%;padding:16px;background:var(--bleu);color:#fff;border:none;border-radius:8px;font-size:1.05rem;font-weight:700;cursor:pointer;letter-spacing:.04em;box-shadow:0 4px 13px rgba(27,42,74,.25);margin-top:3px;touch-action:manipulation;-webkit-appearance:none;}
.bg:active{background:#263d6a;}
.badge-ht{display:inline-block;background:#eaf4ec;color:var(--vert);font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;}
@media(max-width:480px){.g3{grid-template-columns:1fr 1fr;}.lr2-ht{grid-template-columns:1fr 1fr;}}
</style>
</head>

  var TYPE = 'TTC';
  var ligs = [];
  var lidCount = 0;

  // ── Incrément numéro de devis
  function incrNum() {
    var v = document.getElementById('num').value || 'DEV-2026-001';
    var match = v.match(/^(.*?)(\d+)$/);
    if (match) {
      var prefix = match[1];
      var num = parseInt(match[2], 10) + 1;
      var padded = String(num).padStart(match[2].length, '0');
      document.getElementById('num').value = prefix + padded;
    }
  }

  // ── Format date DD/MM/YYYY
  function formatDate(dateStr) {
    if (!dateStr) return new Date().toLocaleDateString('fr-FR');
    var parts = dateStr.split('-');
    if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
    return dateStr;
  }

  function setType(t) {
    TYPE = t;
    document.getElementById('bttc').className = (t === 'TTC') ? 'on' : '';
    document.getElementById('bht').className  = (t === 'HT')  ? 'on' : '';
    render();
  }

  function addLig() { lidCount++; ligs.push({ id: lidCount }); render(); }
  function delLig(id) { ligs = ligs.filter(function(l){ return l.id !== id; }); render(); }
  function fmt(v) { return v.toFixed(2).replace('.', ',') + ' €'; }

  function buildLigneTTC(l, idx) {
    return '<div class="lnum">Ligne ' + (idx+1) + '</div>' +
      '<div class="lr1">' +
        '<div><div class="fl">Désignation</div><input type="text" placeholder="Prunier Quetsche..." id="dd' + l.id + '"></div>' +
        '<div><div class="fl">Taille / Calibre</div><input type="text" placeholder="Ø 25/30cm" id="dt' + l.id + '"></div>' +
      '</div>' +
      '<div class="lr2">' +
        '<div><div class="fl">PU TTC (€)</div><input type="number" placeholder="0.00" step="0.01" min="0" id="dp' + l.id + '"></div>' +
        '<div><div class="fl">Quantité</div><input type="number" placeholder="1" min="0" step="1" id="dq' + l.id + '"></div>' +
        '<div><div class="fl">TVA %</div><select id="dv' + l.id + '"><option value="10">10 %</option><option value="20">20 %</option><option value="0">0 %</option></select></div>' +
      '</div>' +
      '<div class="lr3">' +
        '<div><div class="ltva">dont TVA : <span id="dm' + l.id + '">0,00 €</span></div>' +
        '<div class="ltot">Total TTC : <span id="dt2_' + l.id + '">0,00 €</span></div></div>' +
        '<button class="bd" data-id="' + l.id + '">🗑 Supprimer</button>' +
      '</div>';
  }

  function buildLigneHT(l, idx) {
    return '<div class="lnum">Ligne ' + (idx+1) + ' <span class="badge-ht">Pro HT</span></div>' +
      '<div class="lr1">' +
        '<div><div class="fl">Désignation</div><input type="text" placeholder="Prunier Quetsche..." id="dd' + l.id + '"></div>' +
        '<div><div class="fl">Taille / Calibre</div><input type="text" placeholder="Ø 25/30cm" id="dt' + l.id + '"></div>' +
      '</div>' +
      '<div class="lr2-ht">' +
        '<div><div class="fl">PU TTC (€)</div><input type="number" placeholder="0.00" step="0.01" min="0" id="dp' + l.id + '"></div>' +
        '<div><div class="fl vert">Coeff. remise</div>' +
          '<select id="dc' + l.id + '"><option value="0.85">0,85</option><option value="0.80">0,80</option><option value="0.75">0,75</option><option value="0.70">0,70</option><option value="1">Aucun</option></select></div>' +
        '<div><div class="fl vert">→ PU HT (€)</div><input type="text" id="dh' + l.id + '" readonly placeholder="0,00"></div>' +
        '<div><div class="fl">Quantité</div><input type="number" placeholder="1" min="0" step="1" id="dq' + l.id + '"></div>' +
      '</div>' +
      '<div class="lr2">' +
        '<div><div class="fl">TVA %</div><select id="dv' + l.id + '"><option value="10">10 %</option><option value="20">20 %</option><option value="0">0 %</option></select></div>' +
        '<div><div class="ltva" style="padding-top:20px">dont TVA : <span id="dm' + l.id + '">0,00 €</span></div></div>' +
        '<div><div class="ltot" style="padding-top:20px">Total HT : <span id="dt2_' + l.id + '">0,00 €</span></div></div>' +
      '</div>' +
      '<div class="lr3">' +
        '<div class="coeff-info">Prix TTC × coeff = Prix HT (non visible sur le PDF)</div>' +
        '<button class="bd" data-id="' + l.id + '">🗑 Supprimer</button>' +
      '</div>';
  }

  function render() {
    var c = document.getElementById('ligs');
    c.innerHTML = '';
    ligs.forEach(function(l, idx) {
      var d = document.createElement('div');
      d.className = 'lw';
      d.innerHTML = (TYPE === 'HT') ? buildLigneHT(l, idx) : buildLigneTTC(l, idx);
      c.appendChild(d);
      ['dp','dq','dd'].forEach(function(p) {
        var el = document.getElementById(p + l.id);
        if (el) el.addEventListener('input', calc);
      });
      var sel = document.getElementById('dv' + l.id);
      if (sel) sel.addEventListener('change', calc);
      if (TYPE === 'HT') {
        var dc = document.getElementById('dc' + l.id);
        if (dc) dc.addEventListener('change', calc);
      }
      var btn = d.querySelector('.bd');
      if (btn) btn.addEventListener('click', function() { delLig(parseInt(this.getAttribute('data-id'))); });
    });
    renderTotaux();
    calc();
  }

  function renderTotaux() {
    document.getElementById('totaux').innerHTML =
      '<div class="tl ht"><span>TOTAL HT</span><span id="tht">0,00 €</span></div>' +
      '<div class="tl sub"><span>dont TVA à 10 %</span><span id="tv10">0,00 €</span></div>' +
      '<div class="tl sub"><span>dont TVA à 20 %</span><span id="tv20">0,00 €</span></div>' +
      '<div class="tl fin"><span>TOTAL TTC</span><span id="tfin">0,00 €</span></div>';
  }

  function getData() {
    return ligs.map(function(l) {
      var prix = parseFloat((document.getElementById('dp' + l.id) || {}).value) || 0;
      var coeff = TYPE === 'HT' ? (parseFloat((document.getElementById('dc' + l.id) || {}).value) || 0.85) : 1;
      return {
        desig:   (document.getElementById('dd' + l.id) || {}).value || '',
        tail:    (document.getElementById('dt' + l.id) || {}).value || '',
        prixTTC: prix,
        prixHT:  prix * coeff,
        coeff:   coeff,
        qte:     parseFloat((document.getElementById('dq' + l.id) || {}).value) || 0,
        tva:     parseFloat((document.getElementById('dv' + l.id) || {}).value) || 10
      };
    });
  }

  function calc() {
    var ht = 0, t10 = 0, t20 = 0;
    getData().forEach(function(l, i) {
      var mH, mT, mA;
      if (TYPE === 'TTC') {
        var m = l.prixTTC * l.qte;
        mH = m / (1 + l.tva / 100); mT = m - mH; mA = m;
      } else {
        mH = l.prixHT * l.qte; mT = mH * l.tva / 100; mA = mH;
        var dhEl = document.getElementById('dh' + ligs[i].id);
        if (dhEl) dhEl.value = l.prixHT > 0 ? l.prixHT.toFixed(2).replace('.', ',') : '';
      }
      ht += mH;
      if (l.tva === 10) t10 += mT;
      if (l.tva === 20) t20 += mT;
      var dm = document.getElementById('dm' + ligs[i].id);
      var dt2 = document.getElementById('dt2_' + ligs[i].id);
      if (dm) dm.textContent = fmt(mT);
      if (dt2) dt2.textContent = fmt(mA);
    });
    var ttc = ht + t10 + t20;
    ['tht','tv10','tv20','tfin'].forEach(function(id, i) {
      var el = document.getElementById(id);
      if (el) el.textContent = fmt([ht, t10, t20, ttc][i]);
    });
  }
